<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colors</title>
    <style>
        /*https://codepen.io/web-dot-dev/pen/ZELGraM*/
        h1{
            color: #0bee0b; /*hex code*/

        }
        h2{
            color: rgb(78, 6, 10); /*rgb code*/

        }
        h3{
            color: rgba(78, 6, 10,0.6); /*rgba code color oapcity*/

        }
        h4{
            color: hsl(237, 13%, 35%); /*hsl code color oapcity*/

        }
        h5{
            color: hsla(237, 13%, 35%,0.678); /*hsla code color oapcity*/

        }
    </style>
</head>
<body>
    
    <h1>Hello World</h1>
    <h2>Hello World</h2>
    <h3>Hello World</h3>
    <h4>Hello World</h4>
    <h5>Hello World</h5>
    
</body>
</html>
