<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizontal navigation bar</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        h1{
            
            color: white;
            font-size: 24px;
            margin: 0;
            padding-left: 10px;            
            

        }
        a {
            text-decoration:none ;
            color: white;
            display: inline-block;
            padding: 8px 15px;
        }
        ul{
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            
           

        }
        li{
            
            margin-right: 10px;
            
        
            

            
        }
        a:hover{
            background-color:white;
            color: black;
            border-radius: 3px;
        }
        .header{
            display: flex;
            justify-content: space-between;
            background-color: green;
            border-radius: 10px;
            align-items: center;
            padding: 10px 20px;
        }
        .active{
            background-color: white;
            color: red;
            border-radius: 3px;
            
        }

    </style>
</head>

<body>
    <div class="header">
        <h1>My Heading Menu</h1>
        <nav>
            <ul>
                <li><a class="active" href="#">Home</a></li>
                <li><a href="#">Courses</a></li>
                <li><a href="#">About us</a></li>
                <li><a href="#">Contact us</a></li>
            </ul>
        </nav>

    </div>
</body>
</html>
